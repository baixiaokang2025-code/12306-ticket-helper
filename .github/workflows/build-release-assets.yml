name: Build Release Assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish"
        required: true
        default: "v1.1.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ref.outputs.tag }}
    steps:
      - name: Resolve tag
        id: ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

  build-windows:
    runs-on: windows-latest
    needs: resolve-tag
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Windows package
        shell: cmd
        run: scripts\build_windows.bat ${{ needs.resolve-tag.outputs.tag }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: 12306-ticket-helper-windows-${{ needs.resolve-tag.outputs.tag }}.zip

  build-macos:
    runs-on: macos-latest
    needs: resolve-tag
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build macOS package
        run: bash scripts/build_macos.sh ${{ needs.resolve-tag.outputs.tag }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: 12306-ticket-helper-macos-${{ needs.resolve-tag.outputs.tag }}.zip

  publish-release:
    runs-on: ubuntu-latest
    needs: [resolve-tag, build-windows, build-macos]
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-package

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-package

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          generate_release_notes: true
          files: |
            12306-ticket-helper-windows-${{ needs.resolve-tag.outputs.tag }}.zip
            12306-ticket-helper-macos-${{ needs.resolve-tag.outputs.tag }}.zip
