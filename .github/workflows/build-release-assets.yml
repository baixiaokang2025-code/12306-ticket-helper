name: Build Release Assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to"
        required: true
        default: "v1.0.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Resolve tag
        id: ref
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "tag=${{ inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.tag }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Build Windows app
        run: |
          pyinstaller --noconfirm --clean --windowed --name 12306余票助手 main.py

      - name: Pack zip
        shell: pwsh
        run: |
          $zip = "12306-ticket-helper-windows-${{ steps.ref.outputs.tag }}.zip"
          Compress-Archive -Path "dist\\12306余票助手\\*" -DestinationPath $zip -Force

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ref.outputs.tag }}
          files: 12306-ticket-helper-windows-${{ steps.ref.outputs.tag }}.zip
