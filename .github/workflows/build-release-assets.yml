name: Build Release Assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish"
        required: true
        default: "v1.1.4"
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ref.outputs.tag }}
    steps:
      - name: Resolve tag
        id: ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

  build-windows:
    runs-on: windows-latest
    needs: resolve-tag
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build Windows package
        shell: cmd
        run: scripts\build_windows.bat ${{ needs.resolve-tag.outputs.tag }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: 12306-ticket-helper-windows-${{ needs.resolve-tag.outputs.tag }}.zip

  build-macos:
    runs-on: macos-latest
    needs: resolve-tag
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build macOS package
        run: bash scripts/build_macos.sh ${{ needs.resolve-tag.outputs.tag }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: 12306-ticket-helper-macos-${{ needs.resolve-tag.outputs.tag }}.zip

  publish-release:
    runs-on: ubuntu-latest
    needs: [resolve-tag, build-windows, build-macos]
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-package
          path: release/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-package
          path: release/macos

      - name: Prepare assets and checksums
        shell: bash
        run: |
          mkdir -p release/final
          cp release/windows/*.zip release/final/
          cp release/macos/*.zip release/final/
          cd release/final
          sha256sum *.zip > SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          generate_release_notes: true
          files: |
            release/final/*.zip
            release/final/SHA256SUMS.txt

  publish-package:
    runs-on: ubuntu-latest
    needs: [resolve-tag, build-windows, build-macos]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-package
          path: release/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-package
          path: release/macos

      - name: Prepare package context
        shell: bash
        run: |
          mkdir -p release/final
          cp release/windows/*.zip release/final/
          cp release/macos/*.zip release/final/
          cd release/final
          sha256sum *.zip > SHA256SUMS.txt

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/12306-ticket-helper-assets" >> "$GITHUB_OUTPUT"

      - name: Build and push package image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/release-assets/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ needs.resolve-tag.outputs.tag }}
            ${{ steps.image.outputs.name }}:latest
          labels: |
            org.opencontainers.image.title=12306-ticket-helper-assets
            org.opencontainers.image.version=${{ needs.resolve-tag.outputs.tag }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
